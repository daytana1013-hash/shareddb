name: Deploy SharedDB to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into config.js
        run: |
          sed -i "s/accessCode: 'db2024'/accessCode: '${{ secrets.SHAREDDB_ACCESS_CODE }}'/" js/config.js
          sed -i "s/showDemoHint: true/showDemoHint: false/" js/config.js
          sed -i "s|notionApiKey: ''|notionApiKey: '${{ secrets.NOTION_API_KEY }}'|" js/config.js
          sed -i "s|gasProxyUrl: ''|gasProxyUrl: '${{ secrets.GAS_PROXY_URL }}'|" js/config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
